# Sources for the weekly gather.
#
# Each feed has:
#   name:   a human label shown in the brief and the source-health report
#   url:    an RSS or Atom feed URL
#   weight: 1.0 default. Raise it for sources you trust most (their items rank higher).
#           Lower it for noisy sources you still want to scan.
#   pillar: optional hint. If set, items from this feed default to that pillar when the
#           keyword classifier is unsure. One of: economics, delivery, risk, talent, market.
#
# gather.py is resilient to a dead feed. It logs any feed that returns nothing so you can
# prune this list over time. Add and remove freely. Start broad, then cut what never helps.
#
# Note on coverage: many firm and trade sites do not expose RSS, or move their feed URLs.
# The list below favors sources that have historically published a working feed. When one
# goes dark, replace it. You can also point gather.py at a Google News RSS query for a topic
# (see the examples at the bottom) to cover sources that lack a native feed.

feeds:

  # --- AEC trade press (delivery, market) ---
  - name: Construction Dive
    url: https://www.constructiondive.com/feeds/news/
    weight: 1.2
    pillar: market
  - name: ENR (Engineering News-Record)
    url: https://www.enr.com/rss/all
    weight: 1.3
    pillar: market
  - name: The B1M
    url: https://www.theb1m.com/feed
    weight: 0.8
    pillar: delivery
  - name: AEC Magazine
    url: https://aecmag.com/feed/
    weight: 1.3
    pillar: delivery

  # --- Consulting and professional services (economics, market) ---
  - name: Consultancy.uk
    url: https://www.consultancy.uk/rss/news
    weight: 1.1
    pillar: economics
  - name: Consulting.us
    url: https://www.consulting.us/rss/news
    weight: 1.0
    pillar: economics

  # --- AI research and serious AI news (delivery, risk) ---
  - name: arXiv cs.AI (recent)
    url: http://export.arxiv.org/rss/cs.AI
    weight: 0.7
    pillar: delivery
  - name: arXiv cs.CE (computational engineering)
    url: http://export.arxiv.org/rss/cs.CE
    weight: 0.8
    pillar: delivery
  - name: MIT Technology Review
    url: https://www.technologyreview.com/feed/
    weight: 1.0
    pillar: risk
  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    weight: 0.7

  # --- Google News topic queries (cover sources without native RSS) ---
  # These return recent news matching the query. Tune the query to your beat. They are noisier,
  # so they carry a lower weight.
  - name: GNews - AI engineering consulting
    url: https://news.google.com/rss/search?q=%22engineering+consulting%22+AI&hl=en-US&gl=US&ceid=US:en
    weight: 0.9
  - name: GNews - AI architecture engineering construction
    url: https://news.google.com/rss/search?q=(AEC+OR+%22civil+engineering%22+OR+%22structural+engineering%22)+AI&hl=en-US&gl=US&ceid=US:en
    weight: 0.9
    pillar: delivery
  - name: GNews - consulting firm AI billable
    url: https://news.google.com/rss/search?q=consulting+AI+(billable+OR+pricing+OR+layoffs+OR+headcount)&hl=en-US&gl=US&ceid=US:en
    weight: 0.9
    pillar: economics

# Keyword sets used to score and classify items. Edit freely.
keywords:
  # An item must hit at least one ai term AND one domain term to be kept.
  ai:
    - artificial intelligence
    - " ai "
    - machine learning
    - generative
    - genai
    - llm
    - large language model
    - copilot
    - agent
    - automation
    - neural
    - foundation model
  domain:
    - engineering
    - consulting
    - consultancy
    - construction
    - architecture
    - infrastructure
    - civil
    - structural
    - bim
    - design
    - professional services
    - firm
    - billable
    - project delivery

  # Pillar classification. The first pillar whose terms appear wins. Falls back to the feed's
  # pillar hint, then to "unsorted".
  pillars:
    economics:
      - billable
      - pricing
      - margin
      - revenue
      - utilization
      - fee
      - headcount
      - layoff
      - profit
      - cost
    delivery:
      - bim
      - digital twin
      - generative design
      - simulation
      - tool
      - software
      - platform
      - workflow
      - model
      - copilot
      - cad
    risk:
      - liability
      - regulation
      - compliance
      - insurance
      - security
      - governance
      - ethics
      - risk
      - lawsuit
      - standard
    talent:
      - hiring
      - talent
      - training
      - skills
      - workforce
      - junior
      - graduate
      - jobs
      - upskilling
      - retention
    market:
      - acquisition
      - merger
      - client
      - contract
      - win
      - competitor
      - strategy
      - market
      - demand
      - partnership

# Tuning knobs for the ranker.
settings:
  days_back: 7        # only keep items published within this many days
  max_items: 30       # keep at most this many across all pillars
  recency_half_life_days: 3  # newer items score higher; this sets how fast older ones decay
